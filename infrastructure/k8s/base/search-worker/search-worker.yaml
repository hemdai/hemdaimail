apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-worker
  template:
    metadata:
      labels:
        app: search-worker
    spec:
      containers:
      - name: search-worker
        image: hemdaimail-search-worker:latest
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: hemdaimail-config
        env:
        - name: MEILI_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: hemdaimail-secrets
              key: MEILI_MASTER_KEY
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
