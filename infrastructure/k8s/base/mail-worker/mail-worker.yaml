apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mail-worker
  template:
    metadata:
      labels:
        app: mail-worker
    spec:
      containers:
      - name: mail-worker
        image: hemdaimail-mail-worker:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: hemdaimail-config
        env:
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: hemdaimail-secrets
              key: SMTP_USER
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: hemdaimail-secrets
              key: SMTP_PASS
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          limits:
            cpu: "1000m"
            memory: "1Gi"
          requests:
            cpu: "200m"
            memory: "256Mi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mail-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mail-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
