version: '3.8'

services:
  api:
    build:
      context: ../../services/api
    image: hemdaimail-api:latest
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/webmail
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - "3000:3000"

  mail-worker:
    build:
      context: ../../services/mail-worker
    image: hemdaimail-mail-worker:latest
    depends_on:
      - db
      - redis
      - minio
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/webmail
      - REDIS_URL=redis://redis:6379
      - S3_BUCKET=mail-blobs
      - S3_ENDPOINT=http://minio:9000
    deploy:
      replicas: 2

  search-worker:
    build:
      context: ../../services/search-worker
    image: hemdaimail-search-worker:latest
    depends_on:
      - redis
      - meilisearch
    environment:
      - REDIS_URL=redis://redis:6379
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}

  web:
    build:
      context: ../../apps/web
    image: hemdaimail-web:latest
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000
      - NEXT_PUBLIC_WS_URL=ws://api:3000/ws
    ports:
      - "8080:3000"

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=webmail
      - POSTGRES_PASSWORD=password

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:latest
    volumes:
      - meili_data:/meili_data
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
