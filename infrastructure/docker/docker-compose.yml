version: '3.8'

services:
  # Infrastructure
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: webmail
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      - MEILI_MASTER_KEY=masterKey
    ports:
      - "7700:7700"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  # Applications
  api:
    build:
      context: ../../services/api
    image: hemdaimail-api:latest
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/webmail
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=test_secret
    ports:
      - "4000:4000"

  mail-worker:
    build:
      context: ../../services/mail-worker
    image: hemdaimail-mail-worker:latest
    depends_on:
      - db
      - redis
      - minio
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/webmail
      - REDIS_URL=redis://redis:6379
      - S3_BUCKET=mail-blobs
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin

  search-worker:
    build:
      context: ../../services/search-worker
    image: hemdaimail-search-worker:latest
    depends_on:
      - redis
      - meilisearch
    environment:
      - REDIS_URL=redis://redis:6379
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=masterKey

  web:
    build:
      context: ../../apps/web
    image: hemdaimail-web:latest
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000/ws
    ports:
      - "3000:3000"

volumes:
  postgres_data:
