version: '3.8'

services:
  # Infrastructure
  db:
    image: postgres:15-alpine
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    environment:
      - POSTGRES_DB=webmail
      - POSTGRES_PASSWORD=password

  redis:
    image: redis:alpine
    ports: ["6379:6379"]
    volumes: [redis_data:/data]

  meilisearch:
    image: getmeili/meilisearch:latest
    ports: ["7700:7700"]
    volumes: [meili_data:/meili_data]
    environment:
      - MEILI_MASTER_KEY=masterKey

  # Applications
  api:
    build:
      context: ../../services/api
    image: hemdaimail-api:latest
    depends_on: [db, redis]
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/webmail
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=test_secret
    ports: ["4000:4000"]

  mail-worker:
    build:
      context: ../../services/mail-worker
    image: hemdaimail-mail-worker:latest
    depends_on: [db, redis]
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/webmail
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/data
    volumes: [mail_data:/data]
    deploy:
      replicas: 2

  search-worker:
    build:
      context: ../../services/search-worker
    image: hemdaimail-search-worker:latest
    depends_on: [redis, meilisearch]
    environment:
      - REDIS_URL=redis://redis:6379
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=masterKey

  web:
    build:
      context: ../../apps/web
      args:
        - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${PUBLIC_WS_URL}
    image: hemdaimail-web:latest
    depends_on: [api]
    environment:
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${PUBLIC_WS_URL}
    ports: ["3000:3000"]

volumes:
  postgres_data:
  redis_data:
  meili_data:
  mail_data:
